{% extends 'base.html' %}
{% load static %}

{% block title %}Sign Up - Prestige Coin Vault{% endblock %}

{% block content %}
<section class="pt-32 pb-20 min-h-screen" style="background: #040D26;">
    <div class="container px-4">
        <div class="max-w-md mx-auto rounded-lg p-8 text-center" style="background: rgba(12, 27, 68, 0.8); backdrop-filter: blur(10px);">
            <h2 class="text-3xl font-bold text-white mb-6">Create Account</h2>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 p-4 rounded-lg {% if message.tags == 'error' %}bg-red-900/50 text-red-200{% else %}bg-green-900/50 text-green-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            
            <form method="POST" action="{% url 'signup' %}" class="text-left">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label for="username" class="block text-white/80 mb-2 font-medium">Username</label>
                    <input type="text" id="username" name="username" required 
                           class="w-full px-4 py-3 rounded-lg text-white border border-[#091945] focus:border-[#bd24df] outline-none transition-colors"
                           style="background: #040D26;"
                           placeholder="Choose a username">
                </div>
                
                <div class="mb-4">
                    <label for="email" class="block text-white/80 mb-2 font-medium">Email</label>
                    <input type="email" id="email" name="email" required 
                           class="w-full px-4 py-3 rounded-lg text-white border border-[#091945] focus:border-[#bd24df] outline-none transition-colors"
                           style="background: #040D26;"
                           placeholder="Enter your email">
                </div>
                
                <div class="mb-4">
                    <label for="password1" class="block text-white/80 mb-2 font-medium">Password</label>
                    <input type="password" id="password1" name="password1" required 
                           class="w-full px-4 py-3 rounded-lg text-white border border-[#091945] focus:border-[#bd24df] outline-none transition-colors"
                           style="background: #040D26;"
                           placeholder="Create a password">
                </div>
                
                <div class="mb-6">
                    <label for="password2" class="block text-white/80 mb-2 font-medium">Confirm Password</label>
                    <input type="password" id="password2" name="password2" required 
                           class="w-full px-4 py-3 rounded-lg text-white border border-[#091945] focus:border-[#bd24df] outline-none transition-colors"
                           style="background: #040D26;"
                           placeholder="Confirm your password">
                </div>
                
                <div class="mb-6">
                    <label class="flex items-start">
                        <input type="checkbox" name="terms" required class="mt-1 mr-2">
                        <span class="text-white/60 text-sm">
                            I agree to the <a href="#" class="text-[#bd24df] hover:text-[#2d6ade]">Terms of Service</a> and 
                            <a href="#" class="text-[#bd24df] hover:text-[#2d6ade]">Privacy Policy</a>
                        </span>
                    </label>
                </div>
                
                <button type="submit" class="w-full px-6 py-3 text-white rounded-lg font-semibold hover:opacity-90 transition-opacity" style="background: linear-gradient(to right, #bd24df, #2d6ade);">
                    Create Account
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-white/60">
                    Already have an account? 
                    <a href="{% url 'signin' %}" class="text-[#bd24df] hover:text-[#2d6ade] font-semibold">Sign In</a>
                </p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
