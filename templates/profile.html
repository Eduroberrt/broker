{% load static %}
<!DOCTYPE html>
<html lang="{{ current_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ translations.profile }} - Prestige Coin Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'darkmode': '#0c1b44',
                    }
                }
            }
        }
    </script>
</head>
<body style="background: white; min-height: 100vh;">
    {% include 'partials/dashboard_header.html' %}
    
    <div class="container mx-auto px-4 pt-24 pb-8 max-w-2xl">
        <h1 class="text-3xl font-bold text-gray-900 mb-6">{{ translations.profile }}</h1>
        
        {% if messages %}
            {% for message in messages %}
            <div class="mb-4 p-4 rounded-lg {% if message.tags == 'success' %}bg-green-500/20 text-green-300{% elif message.tags == 'error' %}bg-red-500/20 text-red-300{% else %}bg-blue-500/20 text-blue-300{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}
        
        <div class="bg-gray-100 backdrop-blur-sm rounded-xl p-6">
            <!-- Profile Image Section -->
            <div class="mb-6 flex flex-col items-center">
                <div class="relative mb-4">
                    <img id="profile-image-preview" src="{% if user.profile.profile_image %}{{ user.profile.profile_image.url }}{% else %}https://ui-avatars.com/api/?name={{ user.username }}&size=200&background=bd24df&color=fff{% endif %}" alt="Profile" class="w-32 h-32 rounded-full object-cover border-4 border-[#bd24df]">
                    <!-- Verified Badge -->
                    <div class="absolute bottom-0 left-0 bg-blue-500 rounded-full p-1.5" title="Verified User">
                        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <label for="profile-image-input" class="absolute bottom-0 right-0 bg-[#bd24df] rounded-full p-2 cursor-pointer hover:bg-[#9b1ebf] transition-colors">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </label>
                </div>
            </div>
            
            <!-- Profile Form -->
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <input type="file" id="profile-image-input" name="profile_image" accept="image/*" class="hidden">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-gray-900 mb-2">First Name</label>
                        <input type="text" name="first_name" value="{{ user.first_name }}" class="w-full px-4 py-2 rounded-lg bg-gray-100 text-gray-900 border border-gray-300 focus:border-[#bd24df] focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-900 mb-2">Last Name</label>
                        <input type="text" name="last_name" value="{{ user.last_name }}" class="w-full px-4 py-2 rounded-lg bg-gray-100 text-gray-900 border border-gray-300 focus:border-[#bd24df] focus:outline-none">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-900 mb-2">Username</label>
                    <input type="text" name="username" value="{{ user.username }}" class="w-full px-4 py-2 rounded-lg bg-gray-100 text-gray-900 border border-gray-300 focus:border-[#bd24df] focus:outline-none" required>
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-900 mb-2">Email</label>
                    <input type="email" name="email" value="{{ user.email }}" class="w-full px-4 py-2 rounded-lg bg-gray-100 text-gray-900 border border-gray-300 focus:border-[#bd24df] focus:outline-none" required>
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-900 mb-2">Bio</label>
                    <textarea name="bio" rows="4" class="w-full px-4 py-2 rounded-lg bg-gray-100 text-gray-900 border border-gray-300 focus:border-[#bd24df] focus:outline-none" placeholder="Tell us about yourself...">{{ user.profile.bio|default:'' }}</textarea>
                </div>
                
                <button type="submit" class="w-full px-6 py-3 text-white rounded-lg hover:opacity-90 transition-opacity" style="background: linear-gradient(to right, #bd24df, #2d6ade);">
                    Save Changes
                </button>
            </form>
        </div>
    </div>
    
    <script>
        // Profile image preview
        const imageInput = document.getElementById('profile-image-input');
        const imagePreview = document.getElementById('profile-image-preview');
        
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
        
        // Mobile menu toggle
        const mobileMenuToggle = document.getElementById('mobile-menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileMenuClose = document.getElementById('mobile-menu-close');
        
        if (mobileMenuToggle && mobileMenu && mobileMenuClose) {
            mobileMenuToggle.addEventListener('click', () => {
                mobileMenu.classList.remove('translate-x-full');
            });
            
        mobileMenuClose.addEventListener('click', () => {
            mobileMenu.classList.add('translate-x-full');
        });
    }
</script>
{% include 'partials/dashboard_footer.html' %}

</html>
